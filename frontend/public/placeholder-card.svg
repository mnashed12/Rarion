<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 350" width="250" height="350">
  <defs>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#374151;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f2937;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Card Background -->
  <rect width="250" height="350" rx="12" fill="url(#cardGradient)"/>
  
  <!-- Inner Border -->
  <rect x="8" y="8" width="234" height="334" rx="8" fill="none" stroke="#4b5563" stroke-width="2"/>
  
  <!-- Pokemon Ball Icon -->
  <circle cx="125" cy="150" r="50" fill="none" stroke="#6b7280" stroke-width="4"/>
  <line x1="75" y1="150" x2="175" y2="150" stroke="#6b7280" stroke-width="4"/>
  <circle cx="125" cy="150" r="15" fill="#4b5563" stroke="#6b7280" stroke-width="4"/>
  
  <!-- Text -->
  <text x="125" y="240" font-family="Arial, sans-serif" font-size="16" fill="#9ca3af" text-anchor="middle">Image Not</text>
  <text x="125" y="260" font-family="Arial, sans-serif" font-size="16" fill="#9ca3af" text-anchor="middle">Available</text>
  
  <!-- Small Pokemon Text -->
  <text x="125" y="320" font-family="Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Pokemon Card</text>
</svg>
